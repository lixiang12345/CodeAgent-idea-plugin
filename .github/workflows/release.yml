name: Publish plugin

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      channel:
        description: JetBrains Marketplace channel
        required: false
        default: default
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            sidecar/package-lock.json
            backend/package-lock.json
            vendor/context-engine/package-lock.json

      - name: Install JavaScript dependencies
        run: |
          npm ci --prefix frontend
          npm ci --prefix sidecar
          npm ci --prefix backend
          npm ci --prefix vendor/context-engine

      - name: Validate release tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="$(sed -n 's/^version=//p' gradle.properties)"
          test "${REF_NAME}" = "v${VERSION}"

      - name: Verify release
        run: |
          npm run check --prefix frontend
          npm test --prefix sidecar
          npm test --prefix backend
          npm test --prefix vendor/context-engine
          npm run build --prefix vendor/context-engine
          ./gradlew test buildPlugin verifyPlugin --stacktrace

      - name: Publish signed plugin
        env:
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          PUBLISH_CHANNEL: ${{ inputs.channel || 'default' }}
        run: |
          test -n "${CERTIFICATE_CHAIN}"
          test -n "${PRIVATE_KEY}"
          test -n "${PRIVATE_KEY_PASSWORD}"
          test -n "${PUBLISH_TOKEN}"
          ./gradlew signPlugin verifyPluginSignature publishPlugin --stacktrace

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-plugin-${{ github.ref_name }}
          path: build/distributions/*.zip
          if-no-files-found: error
