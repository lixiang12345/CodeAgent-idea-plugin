name: Verify plugin

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            sidecar/package-lock.json
            backend/package-lock.json
            vendor/context-engine/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install sidecar dependencies
        run: npm ci
        working-directory: sidecar

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Install ContextEngine dependencies
        run: npm ci
        working-directory: vendor/context-engine

      - name: Validate version metadata
        run: node scripts/bump-version.mjs --check

      - name: Check frontend
        run: npm run check
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Verify frontend product alignment
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload frontend alignment report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-frontend-alignment
          path: |
            build/reports/playwright
            build/test-results/playwright
          if-no-files-found: error

      - name: Test sidecar
        run: npm test
        working-directory: sidecar

      - name: Test backend
        run: npm test
        working-directory: backend

      - name: Evaluate integration readiness
        run: node scripts/evaluate-integration-readiness.mjs

      - name: Upload integration readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-integration-readiness
          path: build/reports/integration-readiness.json
          if-no-files-found: error

      - name: Test ContextEngine
        run: npm test
        working-directory: vendor/context-engine

      - name: Build ContextEngine
        run: npm run build
        working-directory: vendor/context-engine

      - name: Evaluate prototype parity
        run: node scripts/evaluate-parity.mjs

      - name: Validate GitHub live acceptance evidence
        run: node scripts/validate-github-live-evidence.mjs

      - name: Upload prototype parity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-prototype-parity
          path: build/reports/prototype-parity.json
          if-no-files-found: error

      - name: Upload GitHub live acceptance validation
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-github-live-acceptance
          path: build/reports/github-live-evidence-validation.json
          if-no-files-found: error

      - name: Evaluate repository retrieval
        run: node scripts/evaluate-retrieval.mjs

      - name: Upload retrieval evaluation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-retrieval-evaluation
          path: build/reports/context-retrieval.json
          if-no-files-found: ignore

      - name: Audit production dependencies
        run: npm audit --omit=dev
        working-directory: frontend

      - name: Audit sidecar dependencies
        run: npm audit --omit=dev
        working-directory: sidecar

      - name: Audit backend dependencies
        run: npm audit --omit=dev
        working-directory: backend

      - name: Audit ContextEngine dependencies
        run: npm audit --omit=dev
        working-directory: vendor/context-engine

      - name: Test and package plugin
        run: ./gradlew test buildPlugin verifyPlugin --stacktrace

      - name: Upload plugin distribution
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-plugin
          path: build/distributions/*.zip
          if-no-files-found: error
